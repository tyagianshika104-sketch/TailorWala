<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TailorWala</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0F6E56;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Syne',sans-serif}

    .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}

    .scissors{font-size:72px;animation:snip 0.6s ease forwards;opacity:0;margin-bottom:1rem}
    @keyframes snip{0%{opacity:0;transform:scale(0.3) rotate(-30deg)}60%{transform:scale(1.15) rotate(5deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}

    .brand-wrap{overflow:hidden;margin-bottom:0.5rem}
    .brand-text{font-size:3.5rem;font-weight:800;color:#fff;letter-spacing:-1px;opacity:0;animation:slideUp 0.7s ease 0.5s forwards}
    .brand-text span{color:#FAECE7}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

    .tagline{font-family:'DM Sans',sans-serif;font-size:1rem;color:rgba(255,255,255,0.8);opacity:0;animation:fadeIn 0.6s ease 1s forwards;margin-bottom:2.5rem}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    .thread{width:120px;height:3px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;opacity:0;animation:fadeIn 0.3s ease 1.3s forwards}
    .thread-fill{height:100%;background:#fff;border-radius:3px;width:0%;animation:load 2s ease 1.4s forwards}
    @keyframes load{from{width:0%}to{width:100%}}

    .loading-text{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.6);margin-top:12px;opacity:0;animation:fadeIn 0.3s ease 1.4s forwards}

    .dots span{animation:blink 1.2s infinite;opacity:0}
    .dots span:nth-child(1){animation-delay:0s}
    .dots span:nth-child(2){animation-delay:0.2s}
    .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

    .fabric{position:fixed;inset:0;pointer-events:none;z-index:0}
    .particle{position:absolute;width:6px;height:6px;border-radius:50%;opacity:0;animation:float var(--dur) ease-in-out var(--delay) infinite}
    @keyframes float{0%{opacity:0;transform:translateY(100vh) scale(0)}20%{opacity:0.6}80%{opacity:0.3}100%{opacity:0;transform:translateY(-20vh) scale(1.5)}}

    .content{position:relative;z-index:1}
  </style>
</head>
<body>

<!-- Floating particles -->
<div class="fabric" id="fabric"></div>

<div class="content splash">
  <div class="scissors">✂️</div>
  <div class="brand-wrap">
    <div class="brand-text">Tailor<span>Wala</span></div>
  </div>
  <div class="tagline">Your Local Tailor, Now Digital 🧵</div>
  <div class="thread"><div class="thread-fill"></div></div>
  <div class="loading-text">Setting up your experience<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
</div>

<script>
// Floating particles
const colors = ['#9FE1CB','#FAECE7','#5DCAA5','#F0997B','rgba(255,255,255,0.5)'];
const fabric = document.getElementById('fabric');
for(let i=0;i<18;i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};--dur:${3+Math.random()*4}s;--delay:${Math.random()*3}s`;
  fabric.appendChild(p);
}

// Welcome sound using Web Audio API
function playWelcomeSound(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6 - happy chord
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.18, start + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.6);
      osc.start(start);
      osc.stop(start + 0.6);
    });
  } catch(e) {}
}

// Play sound after small delay
setTimeout(playWelcomeSound, 400);

// Redirect to main site after animation
setTimeout(() => {
  document.querySelector('.splash').style.animation = 'fadeOut 0.5s ease forwards';
  document.querySelector('.splash').style.transition = 'opacity 0.5s ease';
  document.querySelector('.splash').style.opacity = '0';
  setTimeout(() => { window.location.href = 'index.html'; }, 500);
}, 3500);
</script>
</body>
</html>
